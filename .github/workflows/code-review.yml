name: Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -e ".[dev]"

      - name: Ruff lint review
        id: ruff
        run: |
          echo "## Ruff Lint Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          OUTPUT=$(ruff check src/ api/ tests/ --output-format=concise 2>&1) || true
          if [ -z "$OUTPUT" ]; then
            echo "No lint issues found." >> $GITHUB_STEP_SUMMARY
            echo "clean=true" >> $GITHUB_OUTPUT
          else
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "clean=false" >> $GITHUB_OUTPUT
          fi

      - name: Test review
        id: pytest
        run: |
          echo "## Pytest Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pytest tests/ -v --tb=short 2>&1 | tee /tmp/pytest-output.txt || true
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -oP '\d+ passed' /tmp/pytest-output.txt | grep -oP '\d+' || echo "0")
          FAILED=$(grep -oP '\d+ failed' /tmp/pytest-output.txt | grep -oP '\d+' || echo "0")
          echo "Results: **${TOTAL} passed**, **${FAILED} failed**" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.ruff.outputs.clean }}" = "false" ]; then
            echo "### Lint issues found — please fix before merging." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Lint clean." >> $GITHUB_STEP_SUMMARY
          fi
